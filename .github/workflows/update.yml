name: Update Taiwan Laws

on:
  schedule:
    - cron: "0 2 * * 1"  # every Monday 02:00 UTC (= Monday 10:00 Taipei)
  workflow_dispatch:       # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Fetch and convert
        run: python scripts/fetch_and_convert.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add laws/
          git diff --cached --quiet || git commit -m "chore: update laws $(date -u +%Y-%m-%d)"
          git push
