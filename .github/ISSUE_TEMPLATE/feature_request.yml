name: Feature request
description: Suggest a feature for search, metadata, RAG, CLI, or maintenance automation.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Metadata
        - Search
        - RAG or AI workflow
        - CLI
        - Converter
        - GitHub Actions
        - Documentation
        - Other
    validations:
      required: true
